  cd-job:
    needs: ci-job
    runs-on: ubuntu-latest
    environment: HELM_ENV
    steps:
      - name: Install YQ
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Add Commit SHA To ENV
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
      - name: Clone ArgoCD Repository
        run: |
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/PisethMao/deploy-project-with-argocd.git argocd-repo
      - name: Update Helm Chart
        run: |
          cd argocd-repo/launchly-project
          yq e '.image.repository = "'$DOCKER_USERNAME'/'$DOCKER_IMAGE_NAME'"' -i values.yaml
          yq e '.image.tag = "'$IMAGE_TAG'"' -i values.yaml
      # - name: Update Kubernetes Deployment Image
      #   run: |
      #     cd argocd-repo/launchly-project
      #     yq e '.spec.template.spec.containers[0].image = "'$DOCKER_USERNAME'/'$DOCKER_IMAGE_NAME':'$IMAGE_TAG'"' -i templates/deployment.yaml
      - name: Commit and Push Changes
        run: |
          cd argocd-repo/launchly-project
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Update image to $IMAGE_TAG" || echo "No changes"
          git push
