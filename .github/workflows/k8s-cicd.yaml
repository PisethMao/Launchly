name: Launchly CI/CD Kubernetes Cluster
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
env:
  DOCKER_USERNAME: pisethmao
  DOCKER_IMAGE_NAME: real-devops-website
  IMAGE_TAG: ${{ github.sha }}
jobs:
  ci-job:
    runs-on: ubuntu-latest
    environment: DOCKER_ENV
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Run build
        run: npm run build
      - name: Show Image Information
        run: |
          echo "GitHub SHA: ${{ github.sha }}"
          echo "Docker Image: $DOCKER_USERNAME/$DOCKER_IMAGE_NAME"
          echo "Image Tag: $IMAGE_TAG"
      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
      - name: Build Docker Image
        run: |
          docker build -t $DOCKER_USERNAME/$DOCKER_IMAGE_NAME:$IMAGE_TAG .
          docker tag $DOCKER_USERNAME/$DOCKER_IMAGE_NAME:$IMAGE_TAG $DOCKER_USERNAME/$DOCKER_IMAGE_NAME:latest
      - name: Push Docker Image
        if: github.event_name == 'push'
        run: |
          docker push $DOCKER_USERNAME/$DOCKER_IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKER_USERNAME/$DOCKER_IMAGE_NAME:latest
      - name: Logout From Dockerhub
        if: github.event_name == 'push'
        run: docker logout
