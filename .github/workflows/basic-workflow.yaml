name: Basic CI Workflow
on:
  push:
    branches:
      - master4
  pull_request:
    branches:
      - master
env:
  DOCKER_IMAGE: pisethmao/real-devops-website
  IMAGE_TAG: ${{ github.sha }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run build
        run: npm run build
